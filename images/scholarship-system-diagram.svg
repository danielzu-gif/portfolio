<svg viewBox="0 0 950 350" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Scholarship application system pipeline</title>
<desc>Six-stage pipeline: profile input, scholarship discovery, eligibility matching, essay drafting via Claude API, mandatory human review as a hard gate before submission, then submission and monitoring.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="#B8860B"/>
</marker>
</defs>
<style>
.title{font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;font-size:13.5px;font-weight:700;fill:#1C1C1C;}
.sub{font-family:'Source Sans 3','Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#555555;}
.badge{font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;font-size:11px;font-weight:700;fill:#FFFFFF;}
.gatepill{font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;font-size:10px;font-weight:700;fill:#FFFFFF;}
</style>

<line x1="175" y1="100" x2="195" y2="100" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="355" y1="100" x2="375" y2="100" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="535" y1="100" x2="555" y2="100" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="635" y1="150" x2="635" y2="210" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="715" y1="260" x2="735" y2="260" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>

<g>
<rect x="15" y="50" width="160" height="100" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="31" cy="66" r="9" fill="#B8860B"/>
<text class="badge" x="31" y="66" text-anchor="middle" dominant-baseline="central">1</text>
<text class="title" x="95" y="82" text-anchor="middle">Profile Input</text>
<text class="sub" x="95" y="106" text-anchor="middle">YAML Profile</text>
<text class="sub" x="95" y="120" text-anchor="middle">+ Style Guide</text>
<rect x="30" y="132" width="130" height="4" rx="2" fill="#B8860B"/>
</g>

<g>
<rect x="195" y="50" width="160" height="100" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="211" cy="66" r="9" fill="#B8860B"/>
<text class="badge" x="211" y="66" text-anchor="middle" dominant-baseline="central">2</text>
<text class="title" x="275" y="82" text-anchor="middle">Discovery</text>
<text class="sub" x="275" y="106" text-anchor="middle">Finds Open</text>
<text class="sub" x="275" y="120" text-anchor="middle">Scholarships</text>
<rect x="210" y="132" width="130" height="4" rx="2" fill="#B8860B"/>
</g>

<g>
<rect x="375" y="50" width="160" height="100" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="391" cy="66" r="9" fill="#B8860B"/>
<text class="badge" x="391" y="66" text-anchor="middle" dominant-baseline="central">3</text>
<text class="title" x="455" y="82" text-anchor="middle">Eligibility</text>
<text class="sub" x="455" y="106" text-anchor="middle">Matches Profile</text>
<text class="sub" x="455" y="120" text-anchor="middle">Criteria</text>
<rect x="390" y="132" width="130" height="4" rx="2" fill="#B8860B"/>
</g>

<g>
<rect x="555" y="50" width="160" height="100" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="571" cy="66" r="9" fill="#B8860B"/>
<text class="badge" x="571" y="66" text-anchor="middle" dominant-baseline="central">4</text>
<text class="title" x="635" y="82" text-anchor="middle">Draft</text>
<text class="sub" x="635" y="106" text-anchor="middle">Claude API +</text>
<text class="sub" x="635" y="120" text-anchor="middle">Humanizer Voice</text>
<rect x="570" y="132" width="130" height="4" rx="2" fill="#B8860B"/>
</g>

<g>
<rect x="555" y="210" width="160" height="100" rx="10" fill="#FBF1DC" stroke="#B8860B" stroke-width="2.5"/>
<circle cx="571" cy="226" r="9" fill="#B8860B"/>
<text class="badge" x="571" y="226" text-anchor="middle" dominant-baseline="central">5</text>
<text class="title" x="635" y="242" text-anchor="middle">Human Review</text>
<text class="sub" x="635" y="266" text-anchor="middle">Mandatory Manual</text>
<text class="sub" x="635" y="280" text-anchor="middle">Revision</text>
<rect x="595" y="290" width="80" height="16" rx="8" fill="#B8860B"/>
<text class="gatepill" x="635" y="298" text-anchor="middle" dominant-baseline="central">Hard Gate</text>
</g>

<g>
<rect x="735" y="210" width="160" height="100" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="751" cy="226" r="9" fill="#B8860B"/>
<text class="badge" x="751" y="226" text-anchor="middle" dominant-baseline="central">6</text>
<text class="title" x="815" y="242" text-anchor="middle">Submit &amp; Track</text>
<text class="sub" x="815" y="266" text-anchor="middle">Application</text>
<text class="sub" x="815" y="280" text-anchor="middle">Status</text>
<rect x="750" y="292" width="130" height="4" rx="2" fill="#B8860B"/>
</g>
</svg>
