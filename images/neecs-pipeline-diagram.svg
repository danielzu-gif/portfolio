<svg width="100%" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg" role="img">
<title>NEEC acoustic vibration ML pipeline</title>
<desc>8-step pipeline from motor excitation through data acquisition, mel spectrogram conversion, preprocessing, CNN training, multi-label classification, change detection, to crew maintenance alerting</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: 'Space Grotesk', 'Source Sans 3', sans-serif; }
  .title { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .sub { font-size: 12px; font-weight: 400; fill: #73726C; }
  .num { font-size: 11px; font-weight: 600; fill: white; }
  .label { font-size: 12px; font-weight: 400; font-style: italic; fill: #B8860B; }
  .card { fill: #FFFFFF; stroke: #D3D1C7; stroke-width: 0.5; }
</style>

<!-- ROW 1: Steps 1-4 (left to right) -->

<!-- Step 1 -->
<rect class="card" x="18" y="65" width="135" height="60" rx="8"/>
<text class="title" x="85" y="86" text-anchor="middle" dominant-baseline="central">Excitation</text>
<text class="sub" x="85" y="106" text-anchor="middle" dominant-baseline="central">3 motors, 2V DC</text>
<rect x="30" y="118" width="111" height="3" rx="1.5" fill="#B8860B"/>
<circle cx="30" cy="59" r="12" fill="#B8860B"/>
<text class="num" x="30" y="59" text-anchor="middle" dominant-baseline="central">1</text>

<!-- Arrow 1→2 -->
<line x1="153" y1="95" x2="185" y2="95" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 2 -->
<rect class="card" x="188" y="65" width="135" height="60" rx="8"/>
<text class="title" x="255" y="86" text-anchor="middle" dominant-baseline="central">Acquisition</text>
<text class="sub" x="255" y="106" text-anchor="middle" dominant-baseline="central">6 accel, NI DAQ</text>
<rect x="200" y="118" width="111" height="3" rx="1.5" fill="#B8860B"/>
<circle cx="200" cy="59" r="12" fill="#B8860B"/>
<text class="num" x="200" y="59" text-anchor="middle" dominant-baseline="central">2</text>

<!-- Arrow 2→3 -->
<line x1="323" y1="95" x2="355" y2="95" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 3 -->
<rect class="card" x="358" y="65" width="135" height="60" rx="8"/>
<text class="title" x="425" y="86" text-anchor="middle" dominant-baseline="central">Spectrograms</text>
<text class="sub" x="425" y="106" text-anchor="middle" dominant-baseline="central">Mel conversion</text>
<rect x="370" y="118" width="111" height="3" rx="1.5" fill="#B8860B"/>
<circle cx="370" cy="59" r="12" fill="#B8860B"/>
<text class="num" x="370" y="59" text-anchor="middle" dominant-baseline="central">3</text>

<!-- Arrow 3→4 -->
<line x1="493" y1="95" x2="525" y2="95" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 4 -->
<rect class="card" x="528" y="65" width="135" height="60" rx="8"/>
<text class="title" x="595" y="86" text-anchor="middle" dominant-baseline="central">Preprocessing</text>
<text class="sub" x="595" y="106" text-anchor="middle" dominant-baseline="central">Window + slice</text>
<rect x="540" y="118" width="111" height="3" rx="1.5" fill="#B8860B"/>
<circle cx="540" cy="59" r="12" fill="#B8860B"/>
<text class="num" x="540" y="59" text-anchor="middle" dominant-baseline="central">4</text>

<!-- TURN ARROW (4 → 5) -->
<line x1="595" y1="128" x2="595" y2="255" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Pipeline label -->
<text class="label" x="480" y="195" text-anchor="end">Vibration-change ML pipeline</text>

<!-- ROW 2: Steps 5-8 (right to left) -->

<!-- Step 5 -->
<rect class="card" x="528" y="260" width="135" height="60" rx="8"/>
<text class="title" x="595" y="281" text-anchor="middle" dominant-baseline="central">CNN training</text>
<text class="sub" x="595" y="301" text-anchor="middle" dominant-baseline="central">DeepLearning05</text>
<rect x="540" y="313" width="111" height="3" rx="1.5" fill="#B8860B"/>
<circle cx="540" cy="254" r="12" fill="#B8860B"/>
<text class="num" x="540" y="254" text-anchor="middle" dominant-baseline="central">5</text>

<!-- Arrow 5→6 -->
<line x1="528" y1="290" x2="496" y2="290" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 6 -->
<rect class="card" x="358" y="260" width="135" height="60" rx="8"/>
<text class="title" x="425" y="281" text-anchor="middle" dominant-baseline="central">Classification</text>
<text class="sub" x="425" y="301" text-anchor="middle" dominant-baseline="central">Multi-label CNN</text>
<rect x="370" y="313" width="111" height="3" rx="1.5" fill="#B8860B"/>
<circle cx="370" cy="254" r="12" fill="#B8860B"/>
<text class="num" x="370" y="254" text-anchor="middle" dominant-baseline="central">6</text>

<!-- Arrow 6→7 -->
<line x1="358" y1="290" x2="326" y2="290" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 7 -->
<rect class="card" x="188" y="260" width="135" height="60" rx="8"/>
<text class="title" x="255" y="281" text-anchor="middle" dominant-baseline="central">Change detection</text>
<text class="sub" x="255" y="301" text-anchor="middle" dominant-baseline="central">Monitor shifts</text>
<rect x="200" y="313" width="111" height="3" rx="1.5" fill="#B8860B"/>
<circle cx="200" cy="254" r="12" fill="#B8860B"/>
<text class="num" x="200" y="254" text-anchor="middle" dominant-baseline="central">7</text>

<!-- Arrow 7→8 -->
<line x1="188" y1="290" x2="156" y2="290" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 8 -->
<rect class="card" x="18" y="260" width="135" height="60" rx="8"/>
<text class="title" x="85" y="281" text-anchor="middle" dominant-baseline="central">Alert output</text>
<text class="sub" x="85" y="301" text-anchor="middle" dominant-baseline="central">Crew notification</text>
<rect x="30" y="313" width="111" height="3" rx="1.5" fill="#B8860B"/>
<circle cx="30" cy="254" r="12" fill="#B8860B"/>
<text class="num" x="30" y="254" text-anchor="middle" dominant-baseline="central">8</text>

</svg>
