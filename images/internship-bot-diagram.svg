<svg viewBox="0 0 1080 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Internship Alert Bot architecture</title>
<desc>A GitHub Actions cron job scrapes internship tracker repos, checks for new postings against a seen.json state file, and either notifies via ntfy.sh and commits updated state, or waits for the next scheduled run, looping continuously.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="#B8860B"/>
</marker>
</defs>
<style>
.title{font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:700;fill:#1C1C1C;}
.sub{font-family:'Source Sans 3','Helvetica Neue',Arial,sans-serif;font-size:11.5px;fill:#555555;}
.badge{font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;font-size:11px;font-weight:700;fill:#FFFFFF;}
.annot{font-family:'Source Sans 3','Helvetica Neue',Arial,sans-serif;font-size:11px;font-style:italic;fill:#B8860B;}
.small{font-family:'Source Sans 3','Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#555555;}
</style>

<path d="M960,180 C960,50 110,50 110,180" fill="none" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>
<text class="annot" x="535" y="40" text-anchor="middle">Cycles on Schedule (cron)</text>

<line x1="205" y1="225" x2="225" y2="225" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="415" y1="225" x2="443" y2="225" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="637" y1="225" x2="655" y2="225" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>
<text class="small" x="646" y="211" text-anchor="middle">Yes</text>
<line x1="845" y1="225" x2="865" y2="225" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow)"/>

<line x1="540" y1="290" x2="540" y2="325" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="small" x="540" y="341" text-anchor="middle">No — Wait for Next Run</text>

<g>
<rect x="15" y="180" width="190" height="90" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="32" cy="196" r="10" fill="#B8860B"/>
<text class="badge" x="32" y="196" text-anchor="middle" dominant-baseline="central">1</text>
<text class="title" x="110" y="212" text-anchor="middle">Scheduled Trigger</text>
<text class="sub" x="110" y="238" text-anchor="middle">GitHub Actions cron</text>
</g>

<g>
<rect x="225" y="180" width="190" height="90" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="242" cy="196" r="10" fill="#B8860B"/>
<text class="badge" x="242" y="196" text-anchor="middle" dominant-baseline="central">2</text>
<text class="title" x="320" y="212" text-anchor="middle">Scrape Trackers</text>
<text class="sub" x="320" y="238" text-anchor="middle">Parse Community Repos</text>
</g>

<polygon points="540,160 635,225 540,290 445,225" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<text class="title" x="540" y="225" text-anchor="middle" dominant-baseline="central">New Postings?</text>

<g>
<rect x="655" y="180" width="190" height="90" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="672" cy="196" r="10" fill="#B8860B"/>
<text class="badge" x="672" y="196" text-anchor="middle" dominant-baseline="central">3</text>
<text class="title" x="750" y="212" text-anchor="middle">Notify</text>
<text class="sub" x="750" y="238" text-anchor="middle">Alert via ntfy.sh</text>
</g>

<g>
<rect x="865" y="180" width="190" height="90" rx="10" fill="#FFFFFF" stroke="#E5E3DF" stroke-width="1.5"/>
<circle cx="882" cy="196" r="10" fill="#B8860B"/>
<text class="badge" x="882" y="196" text-anchor="middle" dominant-baseline="central">4</text>
<text class="title" x="960" y="212" text-anchor="middle">Commit State</text>
<text class="sub" x="960" y="238" text-anchor="middle">Updates seen.json</text>
</g>
</svg>
